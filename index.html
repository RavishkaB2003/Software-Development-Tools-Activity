<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inclass</title>
    <style>
        .form {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="form">
        <h1>Welcome</h1>
        <p>Please enter your name to receive a greeting!</p>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button onclick="greet()">Get Greeting</button>
    </div>
    
    
</body>
</html>
